<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metals &amp; Rocks Universe — by HARSH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --gold:#FFD700;--gold2:#FFA500;--silver:#C0C0C0;--cyan:#00FFFF;--violet:#8B00FF;
    --pink:#FF006E;--teal:#00F5FF;--ember:#FF4500;
    --glass:rgba(255,255,255,0.04);--glass2:rgba(255,255,255,0.08);
  }
  html,body{width:100%;height:100%;overflow:hidden;background:#000;cursor:none}
  #app{width:100%;height:100vh;position:relative;overflow:hidden;font-family:'Rajdhani',sans-serif}

  /* CUSTOM CURSOR */
  #cursor{position:fixed;width:12px;height:12px;background:var(--cyan);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform 0.1s,background 0.2s;mix-blend-mode:difference}
  #cursor-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(0,255,255,0.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:transform 0.15s cubic-bezier(.17,.67,.83,.67),width 0.3s,height 0.3s,border-color 0.3s}

  /* STAR CANVAS */
  #starfield{position:absolute;inset:0;z-index:0}

  /* WATERMARK */
  #watermark{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;background:#000;animation:wmFade 0.8s ease 3.2s forwards}
  @keyframes wmFade{to{opacity:0;pointer-events:none}}
  .wm-text{font-family:'Orbitron',monospace;font-size:clamp(3rem,12vw,9rem);font-weight:900;letter-spacing:0.25em;
    background:linear-gradient(135deg,#FFD700 0%,#FFA500 25%,#FF006E 50%,#8B00FF 75%,#00FFFF 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    animation:wmPulse 3.2s ease-in-out forwards;filter:drop-shadow(0 0 40px rgba(255,215,0,0.6))}
  @keyframes wmPulse{
    0%{opacity:0;transform:scale(0.6) translateY(20px);letter-spacing:0.05em}
    20%{opacity:1;transform:scale(1.08) translateY(0);letter-spacing:0.3em}
    70%{opacity:1;transform:scale(1) translateY(0);letter-spacing:0.25em}
    100%{opacity:0;transform:scale(1.1);letter-spacing:0.4em}
  }
  .wm-sub{font-family:'Share Tech Mono',monospace;font-size:clamp(0.5rem,2vw,0.85rem);letter-spacing:0.6em;color:rgba(255,215,0,0.5);margin-top:0.5rem;animation:wmSub 3.2s ease forwards}
  @keyframes wmSub{0%{opacity:0}30%{opacity:0.7}70%{opacity:0.7}100%{opacity:0}}
  .wm-lines{position:absolute;inset:0;overflow:hidden;pointer-events:none}
  .wm-scanline{position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,215,0,0.3),transparent);animation:scan 2s linear infinite}
  @keyframes scan{0%{top:-2%}100%{top:102%}}

  /* PAGES */
  .page{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;transition:opacity 0.8s cubic-bezier(.4,0,.2,1),transform 0.8s cubic-bezier(.4,0,.2,1)}
  .page.hidden{opacity:0;pointer-events:none;transform:translateY(30px)}

  /* INTRO PAGE */
  #intro-page .cosmic-title{font-family:'Orbitron',monospace;font-size:clamp(1.5rem,5vw,4rem);font-weight:900;text-align:center;line-height:1.2;
    background:linear-gradient(135deg,#fff 0%,var(--cyan) 40%,var(--gold) 70%,var(--pink) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    animation:titleReveal 1.5s cubic-bezier(.2,1,.3,1) 4.5s both;filter:drop-shadow(0 0 30px rgba(0,255,255,0.3))}
  @keyframes titleReveal{from{opacity:0;transform:translateY(40px) scale(0.9);letter-spacing:-0.05em}to{opacity:1;transform:none;letter-spacing:0.02em}}
  .cosmic-sub{font-family:'Rajdhani',sans-serif;font-size:clamp(0.8rem,2vw,1.1rem);letter-spacing:0.4em;color:rgba(255,255,255,0.5);text-align:center;animation:fadeUp 1s ease 5.2s both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  .cosmic-line{width:200px;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);margin:1.5rem auto;animation:lineExpand 1s ease 5.5s both}
  @keyframes lineExpand{from{width:0;opacity:0}to{width:200px;opacity:1}}

  /* CATEGORY CARDS */
  .cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;width:100%;max-width:700px;padding:0 1.5rem;animation:fadeUp 1s ease 5.8s both}
  .cat-card{position:relative;border-radius:16px;padding:2rem 1.5rem;text-align:center;cursor:pointer;overflow:hidden;
    border:1px solid rgba(255,255,255,0.1);background:var(--glass);backdrop-filter:blur(20px);
    transition:transform 0.4s cubic-bezier(.2,1,.3,1),border-color 0.3s,box-shadow 0.4s}
  .cat-card::before{content:'';position:absolute;inset:0;background:var(--grad);opacity:0.08;transition:opacity 0.3s;border-radius:16px}
  .cat-card::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at center,rgba(255,255,255,0.05) 0%,transparent 60%);opacity:0;transition:opacity 0.4s;transform:scale(0.5);border-radius:50%}
  .cat-card:hover{transform:translateY(-8px) scale(1.02);box-shadow:0 20px 60px var(--glow)}
  .cat-card:hover::before{opacity:0.18}
  .cat-card:hover::after{opacity:1;transform:scale(1)}
  .cat-card[data-cat="metals"]{--grad:linear-gradient(135deg,#FFD700,#FFA500);--glow:rgba(255,180,0,0.3)}
  .cat-card[data-cat="metals"]:hover{border-color:rgba(255,215,0,0.5)}
  .cat-card[data-cat="rocks"]{--grad:linear-gradient(135deg,#00FFFF,#8B00FF);--glow:rgba(0,200,255,0.3)}
  .cat-card[data-cat="rocks"]:hover{border-color:rgba(0,255,255,0.5)}
  .cat-icon{font-size:2.5rem;margin-bottom:0.75rem;display:block}
  .cat-name{font-family:'Orbitron',monospace;font-size:1.3rem;font-weight:700;letter-spacing:0.1em}
  .cat-card[data-cat="metals"] .cat-name{color:var(--gold)}
  .cat-card[data-cat="rocks"] .cat-name{color:var(--cyan)}
  .cat-desc{font-size:0.85rem;color:rgba(255,255,255,0.5);margin-top:0.5rem;letter-spacing:0.05em}
  .cat-count{display:inline-block;margin-top:0.75rem;font-size:0.7rem;letter-spacing:0.15em;padding:4px 12px;border-radius:20px;border:1px solid;font-family:'Share Tech Mono',monospace}
  .cat-card[data-cat="metals"] .cat-count{border-color:rgba(255,215,0,0.3);color:rgba(255,215,0,0.7)}
  .cat-card[data-cat="rocks"] .cat-count{border-color:rgba(0,255,255,0.3);color:rgba(0,255,255,0.7)}

  /* COLLECTION PAGE */
  #collection-page{padding:0;justify-content:flex-start;overflow-y:auto;overflow-x:hidden}
  .col-header{position:sticky;top:0;width:100%;z-index:100;padding:1rem 1.5rem;background:rgba(0,0,0,0.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:1rem;flex-shrink:0}
  .back-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:0.85rem;letter-spacing:0.1em;transition:all 0.2s}
  .back-btn:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.3)}
  .col-title{font-family:'Orbitron',monospace;font-size:1.3rem;font-weight:700}
  .col-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1.2rem;padding:1.5rem;width:100%}

  /* ITEM CARDS */
  .item-card{position:relative;border-radius:14px;overflow:hidden;cursor:pointer;aspect-ratio:3/4;
    border:1px solid rgba(255,255,255,0.08);background:rgba(10,10,20,0.9);
    transition:transform 0.4s cubic-bezier(.2,1,.3,1),box-shadow 0.4s,border-color 0.3s;
    transform-style:preserve-3d}
  .item-card:hover{transform:translateY(-6px) scale(1.02);z-index:10}
  .item-card-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0.6;transition:opacity 0.3s,transform 0.4s}
  .item-card:hover .item-card-bg{opacity:0.8;transform:scale(1.05)}
  .item-card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.95) 0%,rgba(0,0,0,0.4) 50%,transparent 100%)}
  .item-card-content{position:absolute;bottom:0;left:0;right:0;padding:1rem}
  .item-name{font-family:'Orbitron',monospace;font-size:0.85rem;font-weight:700;color:#fff;letter-spacing:0.05em;margin-bottom:0.4rem}
  .item-formula{font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:rgba(255,255,255,0.4);margin-bottom:0.5rem}
  .item-tags{display:flex;flex-wrap:wrap;gap:4px}
  .tag{font-size:0.55rem;letter-spacing:0.08em;padding:2px 7px;border-radius:20px;font-family:'Share Tech Mono',monospace}
  .tag-rare{background:rgba(255,215,0,0.15);color:var(--gold);border:1px solid rgba(255,215,0,0.25)}
  .tag-precious{background:rgba(192,192,192,0.12);color:#e0e0e0;border:1px solid rgba(192,192,192,0.2)}
  .tag-radioactive{background:rgba(0,255,100,0.1);color:#00ff64;border:1px solid rgba(0,255,100,0.2)}
  .tag-volcanic{background:rgba(255,80,0,0.12);color:#ff6030;border:1px solid rgba(255,80,0,0.25)}
  .tag-gemstone{background:rgba(138,0,255,0.12);color:#bf7fff;border:1px solid rgba(138,0,255,0.25)}
  .tag-common{background:rgba(120,120,140,0.12);color:#9090a0;border:1px solid rgba(120,120,140,0.2)}
  .tag-crystal{background:rgba(0,255,255,0.1);color:var(--cyan);border:1px solid rgba(0,255,255,0.2)}
  .tag-metamorphic{background:rgba(255,150,0,0.1);color:#ffaa44;border:1px solid rgba(255,150,0,0.2)}
  .item-glow{position:absolute;inset:0;border-radius:14px;opacity:0;transition:opacity 0.3s;pointer-events:none}
  .item-card:hover .item-glow{opacity:1}

  /* DETAIL PAGE */
  #detail-page{justify-content:flex-start;padding:0;overflow-y:auto}
  .detail-hero{position:relative;width:100%;height:280px;flex-shrink:0;overflow:hidden}
  .detail-hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(3px) brightness(0.5)}
  .detail-hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.3) 0%,rgba(0,0,0,0.95) 100%)}
  .detail-hero-content{position:absolute;bottom:0;left:0;right:0;padding:2rem}
  .detail-name{font-family:'Orbitron',monospace;font-size:clamp(1.5rem,5vw,2.5rem);font-weight:900;color:#fff;margin-bottom:0.3rem}
  .detail-sciname{font-family:'Share Tech Mono',monospace;font-size:0.85rem;color:rgba(255,255,255,0.45);letter-spacing:0.1em;margin-bottom:0.75rem}
  .detail-body{padding:1.5rem;display:flex;flex-direction:column;gap:1.2rem}
  .detail-section{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:1.2rem;backdrop-filter:blur(10px)}
  .detail-section h3{font-family:'Orbitron',monospace;font-size:0.75rem;font-weight:700;letter-spacing:0.2em;color:rgba(255,255,255,0.4);margin-bottom:0.75rem;text-transform:uppercase}
  .detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:0.75rem}
  .detail-stat{background:rgba(0,0,0,0.3);border-radius:8px;padding:0.75rem;border:1px solid rgba(255,255,255,0.06)}
  .stat-label{font-size:0.65rem;letter-spacing:0.1em;color:rgba(255,255,255,0.35);font-family:'Share Tech Mono',monospace;margin-bottom:0.25rem}
  .stat-value{font-size:0.9rem;font-weight:600;color:#fff;font-family:'Orbitron',monospace}
  .detail-text{font-size:0.9rem;color:rgba(255,255,255,0.7);line-height:1.7}
  .uses-list{display:flex;flex-wrap:wrap;gap:8px}
  .use-chip{font-size:0.75rem;padding:5px 12px;border-radius:20px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);font-family:'Rajdhani',sans-serif;letter-spacing:0.05em}
  .rarity-bar{height:8px;border-radius:4px;background:rgba(255,255,255,0.08);margin-top:0.5rem;overflow:hidden}
  .rarity-fill{height:100%;border-radius:4px;transition:width 1s cubic-bezier(.2,1,.3,1) 0.5s}
  .rarity-label{display:flex;justify-content:space-between;font-size:0.7rem;color:rgba(255,255,255,0.35);margin-top:0.3rem;font-family:'Share Tech Mono',monospace}
  .hardness-dots{display:flex;gap:4px;margin-top:0.5rem}
  .h-dot{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15)}
  .h-dot.filled{background:var(--accent-color,#00ffff)}
  .fact-box{background:rgba(0,0,0,0.3);border-radius:8px;padding:0.9rem;border-left:3px solid var(--accent-color,#00ffff);font-size:0.85rem;color:rgba(255,255,255,0.7);line-height:1.6;font-style:italic}
  .detail-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:0.75rem}
  .chart-bar-wrap{display:flex;flex-direction:column;gap:8px;margin-top:0.5rem}
  .chart-row{display:flex;align-items:center;gap:8px;font-size:0.7rem;font-family:'Share Tech Mono',monospace;color:rgba(255,255,255,0.5)}
  .chart-label{width:80px;text-align:right;flex-shrink:0}
  .chart-track{flex:1;height:6px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden}
  .chart-fill{height:100%;border-radius:3px;animation:barGrow 1s cubic-bezier(.2,1,.3,1) both}
  @keyframes barGrow{from{width:0}to{width:var(--w)}}
  .chart-val{width:35px;flex-shrink:0;font-size:0.6rem}
  .related-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:0.5rem}
  .related-chip{padding:6px 14px;border-radius:20px;font-size:0.75rem;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);cursor:pointer;transition:all 0.2s;font-family:'Rajdhani',sans-serif;letter-spacing:0.05em}
  .related-chip:hover{background:rgba(255,255,255,0.1);border-color:#00ffff;color:#fff}

  /* NEBULAE */
  .nebula{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.15;animation:nebDrift 20s ease-in-out infinite;pointer-events:none}
  @keyframes nebDrift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-20px) scale(1.1)}}

  /* PARTICLE CANVAS */
  #particles{position:absolute;inset:0;pointer-events:none;z-index:1}

  /* NAV DOTS */
  .nav-hint{position:fixed;top:1.2rem;right:1.5rem;display:flex;gap:8px;z-index:200}
  .nav-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.2);transition:all 0.3s;cursor:pointer}
  .nav-dot.active{background:#00ffff;box-shadow:0 0 8px #00ffff}

  /* SCROLL INDICATOR */
  .scroll-hint{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);font-size:0.65rem;letter-spacing:0.3em;color:rgba(255,255,255,0.2);font-family:'Share Tech Mono',monospace;animation:fadeUp 1s ease 6.5s both,blink 2s ease-in-out 7s infinite}
  @keyframes blink{0%,100%{opacity:0.2}50%{opacity:0.6}}

  /* SCROLLBAR STYLING */
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:rgba(255,255,255,0.02)}
  ::-webkit-scrollbar-thumb{background:rgba(0,255,255,0.2);border-radius:2px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(0,255,255,0.4)}

  /* MOBILE RESPONSIVE */
  @media(max-width:600px){
    .cat-grid{grid-template-columns:1fr;max-width:340px}
    .col-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
    .detail-grid{grid-template-columns:1fr 1fr}
  }
</style>
</head>
<body>
<div id="app">

  <!-- WATERMARK -->
  <div id="watermark">
    <div class="wm-lines"><div class="wm-scanline"></div></div>
    <div style="text-align:center">
      <div class="wm-text">HARSH</div>
      <div class="wm-sub">◆ COSMIC COLLECTION ◆</div>
    </div>
  </div>

  <!-- NEBULAE BACKGROUND -->
  <div class="nebula" style="width:600px;height:600px;top:-100px;left:-150px;background:radial-gradient(circle,rgba(0,100,255,0.4),transparent);animation-duration:25s"></div>
  <div class="nebula" style="width:500px;height:500px;bottom:-100px;right:-100px;background:radial-gradient(circle,rgba(138,0,255,0.35),transparent);animation-duration:18s;animation-delay:-8s"></div>
  <div class="nebula" style="width:400px;height:400px;top:30%;left:30%;background:radial-gradient(circle,rgba(255,80,0,0.15),transparent);animation-duration:22s;animation-delay:-4s"></div>

  <canvas id="starfield"></canvas>
  <canvas id="particles"></canvas>

  <!-- CUSTOM CURSOR -->
  <div id="cursor"></div>
  <div id="cursor-ring"></div>

  <!-- NAV DOTS -->
  <div class="nav-hint">
    <div class="nav-dot active" id="dot0"></div>
    <div class="nav-dot" id="dot1"></div>
    <div class="nav-dot" id="dot2"></div>
  </div>

  <!-- INTRO PAGE -->
  <div class="page" id="intro-page">
    <div class="cosmic-title">Metals &amp; Rocks Universe</div>
    <div class="cosmic-sub">EXPLORE THE HIDDEN POWER OF EARTH</div>
    <div class="cosmic-line"></div>
    <div class="cat-grid">
      <div class="cat-card" data-cat="metals" onclick="showCollection('metals')">
        <div class="cat-icon">⚙</div>
        <div class="cat-name">METALS</div>
        <div class="cat-desc">From gold to uranium — the elements that built civilization</div>
        <div class="cat-count">12 ELEMENTS</div>
      </div>
      <div class="cat-card" data-cat="rocks" onclick="showCollection('rocks')">
        <div class="cat-icon">💠</div>
        <div class="cat-name">ROCKS &amp; GEMS</div>
        <div class="cat-desc">Ancient minerals forged by volcanic fury and cosmic time</div>
        <div class="cat-count">10 SPECIMENS</div>
      </div>
    </div>
    <div class="scroll-hint">▼ SELECT A CATEGORY TO EXPLORE</div>
  </div>

  <!-- COLLECTION PAGE -->
  <div class="page hidden" id="collection-page">
    <div class="col-header">
      <button class="back-btn" onclick="goBack('intro')">← BACK</button>
      <div class="col-title" id="col-title">METALS</div>
    </div>
    <div class="col-grid" id="col-grid"></div>
  </div>

  <!-- DETAIL PAGE -->
  <div class="page hidden" id="detail-page">
    <div class="detail-hero" id="detail-hero">
      <div class="detail-hero-bg" id="detail-hero-bg"></div>
      <div class="detail-hero-overlay"></div>
      <div class="detail-hero-content">
        <button class="back-btn" id="detail-back">← COLLECTION</button>
        <div style="height:0.75rem"></div>
        <div class="detail-name" id="detail-name"></div>
        <div class="detail-sciname" id="detail-sciname"></div>
        <div class="detail-tags" id="detail-tags"></div>
      </div>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>

</div>

<script>
const METALS = [
  {id:'gold',name:'Gold',sci:'Aurum (Au)',formula:'Au',color:'#FFD700',emoji:'✦',
   tags:['rare','precious'],gradient:'linear-gradient(135deg,#8B6914,#FFD700,#FFA500)',
   bg:'linear-gradient(135deg,#1a1200,#3d2e00,#6b4f00)',
   hardness:2.5,rarity:98,
   composition:'Pure elemental gold, atomic number 79',
   origin:'Formed in neutron star collisions; found in veins, alluvial deposits, and sea water',
   physical:'Yellow lustrous metal, extremely malleable, ductile, dense (19.3 g/cm³), excellent conductor',
   crystal:'Cubic (face-centered)',
   uses:['Jewelry','Electronics','Dentistry','Aerospace','Currency','Medicine'],
   history:'Used since 4000 BC in Egypt; powered early economies; backed global currencies until 1971',
   facts:'All gold ever mined fits in a 22-meter cube. Gold is edible and non-toxic. One ounce can be stretched into 80km of wire.',
   related:['Silver','Platinum','Electrum'],
   properties:[{label:'Density',val:'19.3 g/cm³',pct:95},{label:'Conductivity',val:'High',pct:82},{label:'Melting Pt',val:'1064°C',pct:45}]},
  {id:'silver',name:'Silver',sci:'Argentum (Ag)',formula:'Ag',color:'#C0C0C0',emoji:'◈',
   tags:['precious','common'],gradient:'linear-gradient(135deg,#666,#C0C0C0,#fff)',
   bg:'linear-gradient(135deg,#0a0a12,#1a1a2e,#2d2d44)',
   hardness:2.5,rarity:75,
   composition:'Pure elemental silver, atomic number 47',
   origin:'Found in Earth\'s crust in veins, often with lead and copper ores',
   physical:'White lustrous metal, highest electrical and thermal conductivity of all metals, density 10.5 g/cm³',

// STATE
let currentCat = 'metals';
let mouseX = 0, mouseY = 0, cursorX = 0, cursorY = 0;

// CURSOR
document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
(function animCursor(){
  cursorX += (mouseX - cursorX) * 0.12;
  cursorY += (mouseY - cursorY) * 0.12;
  const c = document.getElementById('cursor');
  const r = document.getElementById('cursor-ring');
  if(c){ c.style.left = mouseX+'px'; c.style.top = mouseY+'px'; }
  if(r){ r.style.left = cursorX+'px'; r.style.top = cursorY+'px'; }
  requestAnimationFrame(animCursor);
})();

// STARFIELD
(function initStars(){
  const c = document.getElementById('starfield');
  const ctx = c.getContext('2d');
  let W, H, stars = [];
  function resize(){ W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for(let i=0;i<250;i++) stars.push({
    x:Math.random()*2000, y:Math.random()*2000,
    r:Math.random()*1.8+0.2, speed:Math.random()*0.4+0.05,
    alpha:Math.random()*0.8+0.2,
    tp: Math.random()*Math.PI*2,
    ts: Math.random()*0.02+0.005,
    color: ['#fff','#cce8ff','#ffeecc','#ffd0ff'][Math.floor(Math.random()*4)]
  });
  let t=0;
  (function draw(){
    t+=0.016; ctx.clearRect(0,0,W,H);
    ctx.globalAlpha = 1;
    stars.forEach(s=>{
      s.x -= s.speed*0.3; s.y -= s.speed*0.1;
      if(s.x<0) s.x=W+10; if(s.y<0) s.y=H+10;
      const a = s.alpha * (0.5 + 0.5*Math.sin(t*80*s.ts + s.tp));
      ctx.globalAlpha = a;
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(s.x%W, s.y%H, s.r, 0, Math.PI*2);
      ctx.fill();
    });
    ctx.globalAlpha=1;
    requestAnimationFrame(draw);
  })();
})();

// PARTICLES
(function initParticles(){
  const c = document.getElementById('particles');
  const ctx = c.getContext('2d');
  let W, H, pts = [];
  function resize(){ W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for(let i=0;i<50;i++) pts.push({
    x:Math.random()*1920, y:Math.random()*1080,
    vx:(Math.random()-0.5)*0.4, vy:(Math.random()-0.5)*0.4,
    life:Math.random(), decay:Math.random()*0.003+0.001,
    size:Math.random()*3+1,
    color:['#00ffff','#8b00ff','#ffd700','#ff006e'][Math.floor(Math.random()*4)]
  });
  (function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x += p.vx; p.y += p.vy; p.life -= p.decay;
      if(p.life<=0){p.x=Math.random()*W;p.y=Math.random()*H;p.life=1;}
      ctx.beginPath();
      ctx.arc(p.x%W, p.y%H, p.size*p.life, 0, Math.PI*2);
      ctx.globalAlpha = p.life*0.35;
      ctx.fillStyle = p.color;
      ctx.fill();
    });
    ctx.globalAlpha=1;
    requestAnimationFrame(draw);
  })();
})();

// NAV DOTS
function setDot(n){ ['dot0','dot1','dot2'].forEach((id,i)=>document.getElementById(id).classList.toggle('active',i===n)); }

// SHOW COLLECTION
function showCollection(cat){
  currentCat = cat;
  const data = cat==='metals'?METALS:ROCKS;
  const colTitle = document.getElementById('col-title');
  colTitle.textContent = cat==='metals'?'⚙ METALS COLLECTION':'💠 ROCKS & GEMS COLLECTION';
  colTitle.style.color = cat==='metals'?'#FFD700':'#00FFFF';
  const grid = document.getElementById('col-grid');
  grid.innerHTML = '';
  data.forEach(item=>{
    const card = document.createElement('div');
    card.className = 'item-card';
    const tagHTML = item.tags.map(t=>`<span class="tag tag-${t}">${t.toUpperCase()}</span>`).join('');
    card.innerHTML = `
      <div class="item-card-bg" style="background:${item.gradient}"></div>
      <div class="item-card-overlay"></div>
      <div class="item-glow" style="box-shadow:inset 0 0 40px ${item.color}33"></div>
      <div class="item-card-content">
        <div style="font-size:1.5rem;margin-bottom:0.4rem">${item.emoji}</div>
        <div class="item-name">${item.name}</div>
        <div class="item-formula">${item.formula}</div>
        <div class="item-tags">${tagHTML}</div>
      </div>`;
    card.addEventListener('mousemove', e=>{
      const rect = card.getBoundingClientRect();
      const dx = (e.clientX - rect.left - rect.width/2)/(rect.width/2);
      const dy = (e.clientY - rect.top - rect.height/2)/(rect.height/2);
      card.style.transform = `translateY(-6px) scale(1.02) rotateY(${dx*10}deg) rotateX(${-dy*10}deg)`;
      card.style.boxShadow = `${-dx*15}px ${-dy*15}px 40px ${item.color}44, 0 20px 60px rgba(0,0,0,0.6)`;
      card.style.borderColor = item.color+'44';
    });
    card.addEventListener('mouseleave', ()=>{ card.style.transform=''; card.style.boxShadow=''; card.style.borderColor=''; });
    card.addEventListener('click', ()=>showDetail(item));
    grid.appendChild(card);
  });
  switchPage('collection-page'); setDot(1);
}

// SHOW DETAIL
function showDetail(item){
  document.getElementById('detail-name').textContent = item.name;
  document.getElementById('detail-sciname').textContent = item.sci;
  document.getElementById('detail-hero-bg').style.background = item.gradient;
  document.getElementById('detail-tags').innerHTML = item.tags.map(t=>`<span class="tag tag-${t}">${t.toUpperCase()}</span>`).join('');
  document.getElementById('detail-back').onclick = ()=>goBack('collection');
  document.documentElement.style.setProperty('--accent-color', item.color);
  const ac = item.color;
  const hdots = Array.from({length:10},(_,i)=>`<div class="h-dot${i<Math.round(item.hardness)?' filled':''}"></div>`).join('');
  const propBars = item.properties.map((p,i)=>`
    <div class="chart-row">
      <div class="chart-label">${p.label}</div>
      <div class="chart-track"><div class="chart-fill" style="--w:${p.pct}%;width:${p.pct}%;background:${ac};animation-delay:${i*0.15}s"></div></div>
      <div class="chart-val">${p.val.length>8?p.val.substring(0,8)+'…':p.val}</div>
    </div>`).join('');
  document.getElementById('detail-body').innerHTML = `
    <div class="detail-section">
      <h3>Properties</h3>
      <div class="detail-grid">
        <div class="detail-stat"><div class="stat-label">ORIGIN</div><div class="stat-value" style="font-size:0.7rem;color:rgba(255,255,255,0.8)">${item.origin.substring(0,55)}…</div></div>
        <div class="detail-stat"><div class="stat-label">CRYSTAL STRUCTURE</div><div class="stat-value" style="color:${ac};font-size:0.75rem">${item.crystal}</div></div>
        <div class="detail-stat"><div class="stat-label">HARDNESS (MOHS)</div><div class="hardness-dots">${hdots}</div><div style="font-size:0.65rem;color:rgba(255,255,255,0.35);margin-top:4px;font-family:'Share Tech Mono'">${item.hardness}/10</div></div>
        <div class="detail-stat"><div class="stat-label">RARITY INDEX</div><div class="rarity-bar"><div class="rarity-fill" style="width:${item.rarity}%;background:linear-gradient(90deg,${ac}88,${ac})"></div></div><div class="rarity-label"><span>Common</span><span>Rare</span></div></div>
      </div>
    </div>
    <div class="detail-section">
      <h3>Composition & Physical Properties</h3>
      <p class="detail-text"><strong style="color:${ac}">Composition:</strong> ${item.composition}</p>
      <p class="detail-text" style="margin-top:0.6rem"><strong style="color:${ac}">Physical:</strong> ${item.physical}</p>
    </div>
    <div class="detail-section">
      <h3>Performance Analysis</h3>
      <div class="chart-bar-wrap">${propBars}</div>
    </div>
    <div class="detail-section">
      <h3>Real-World Uses</h3>
      <div class="uses-list">${item.uses.map(u=>`<div class="use-chip">${u}</div>`).join('')}</div>
    </div>
    <div class="detail-section">
      <h3>Historical Significance</h3>
      <p class="detail-text">${item.history}</p>
    </div>
    <div class="detail-section">
      <h3>Fascinating Facts</h3>
      <div class="fact-box">${item.facts}</div>
    </div>
    <div class="detail-section">
      <h3>Related Minerals & Elements</h3>
      <div class="related-grid">${item.related.map(r=>`<div class="related-chip" onclick="findAndShow('${r}')">${r}</div>`).join('')}</div>
    </div>
    <div style="height:2rem"></div>`;
  switchPage('detail-page'); setDot(2);
  document.getElementById('detail-page').scrollTop = 0;
}

function findAndShow(name){
  const item = [...METALS,...ROCKS].find(x=>x.name.toLowerCase()===name.toLowerCase());
  if(item) showDetail(item);
}

function goBack(to){
  if(to==='intro'){ switchPage('intro-page'); setDot(0); }
  else { switchPage('collection-page'); setDot(1); }
}

function switchPage(id){
  ['intro-page','collection-page','detail-page'].forEach(p=>{
    const el = document.getElementById(p);
    if(el) el.classList.toggle('hidden', p!==id);
  });
}

// Remove watermark
setTimeout(()=>{ const wm=document.getElementById('watermark'); if(wm) wm.style.display='none'; }, 4200);
</script>
